<mat-card
  class="product-card"
  (click)="goToDetail()"
  (mouseenter)="pauseAutoSlide()"
  (mouseleave)="resumeAutoSlide()"
>
  <div class="product-media">
    <div class="product-slider">
      <img
        *ngFor="let image of images; let i = index"
        mat-card-image
        [src]="image"
        [alt]="product.name"
        [class.is-active]="i === currentImageIndex"
      />
    </div>

    <div class="product-badges" *ngIf="getDeliveryLabel() as deliveryLabel">
      <span class="product-badge">{{ deliveryLabel }}</span>
    </div>
  </div>

  <mat-card-content class="product-body">
    <p class="product-meta">{{ product.code }}</p>
    <h3 class="product-title">{{ product.name }}</h3>
    <div class="product-price">{{ product.price | currency: 'ARS' : 'symbol-narrow' }}</div>
    <span class="product-cta">Ver producto</span>
  </mat-card-content>
</mat-card>
